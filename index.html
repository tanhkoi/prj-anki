<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2b6cb0">
<title>JLPT Kanji Search</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #fafafa;
    --fg: #222;
    --muted: #666;
    --card: #fff;
    --border: #e0e0e0;
    --accent: #2b6cb0;
    --accent-fg: #fff;
    --chip: #eef3fb;
    --chip-fg: #2b6cb0;
    --shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #15171a;
      --fg: #e6e6e6;
      --muted: #9aa0a6;
      --card: #1e2126;
      --border: #2c2f36;
      --accent: #4a90d9;
      --chip: #213044;
      --chip-fg: #9cc3ee;
      --shadow: 0 1px 2px rgba(0,0,0,.3);
    }
  }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.45;
    -webkit-text-size-adjust: 100%;
  }
  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px clamp(12px, 3vw, 24px) 32px;
  }
  header {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding-top: 12px;
    padding-bottom: 8px;
    z-index: 10;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  h1 {
    font-size: clamp(16px, 2.4vw, 20px);
    margin: 0 0 10px;
  }
  .controls {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 8px;
  }
  @media (max-width: 600px) {
    .controls { grid-template-columns: 1fr 1fr 1fr; }
    .controls input { grid-column: 1 / -1; }
  }
  input, select, button {
    font: inherit;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card);
    color: var(--fg);
    min-height: 40px;
  }
  input:focus, select:focus, button:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  button {
    cursor: pointer;
    background: var(--accent);
    color: var(--accent-fg);
    border-color: var(--accent);
  }
  button.ghost {
    background: transparent;
    color: var(--fg);
    border-color: var(--border);
  }
  .hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .chip {
    background: var(--chip);
    color: var(--chip-fg);
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .chip button {
    all: unset;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    color: inherit;
    opacity: .7;
  }
  .chip button:hover { opacity: 1; }
  .status {
    font-size: 12px;
    color: var(--muted);
    margin: 8px 0 0;
  }
  .results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
    gap: clamp(8px, 1.5vw, 14px);
    margin-top: 12px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: clamp(10px, 2vw, 14px);
    box-shadow: var(--shadow);
    overflow-wrap: anywhere;
  }
  .head {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .kanji {
    font-size: clamp(40px, 9vw, 56px);
    font-weight: 700;
    line-height: 1;
  }
  .level {
    background: var(--accent);
    color: var(--accent-fg);
    font-size: 11px;
    padding: 3px 7px;
    border-radius: 3px;
    letter-spacing: .5px;
  }
  .row {
    font-size: clamp(12px, 1.6vw, 14px);
    margin: 4px 0;
    display: flex;
    gap: 6px;
  }
  .label {
    color: var(--muted);
    flex: 0 0 88px;
  }
  .val { flex: 1; min-width: 0; }
  .explain {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
    font-style: italic;
    font-size: clamp(12px, 1.6vw, 13.5px);
    color: var(--muted);
  }
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--muted);
    padding: 24px;
  }
  .missing {
    grid-column: 1 / -1;
    color: var(--muted);
    font-size: 12px;
    padding: 4px 2px 0;
  }
  mark {
    background: #fff3a3;
    color: inherit;
    padding: 0 1px;
    border-radius: 2px;
  }
  @media (prefers-color-scheme: dark) {
    mark { background: #5a4b1a; color: #fff; }
  }
  @media (max-width: 360px) {
    .label { flex-basis: 72px; font-size: 11px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>JLPT Kanji Search (N5–N1)</h1>
    <div class="controls">
      <input id="q" type="search" inputmode="search"
             placeholder="Nhiều kanji: 鼓 山 川  hoặc  日,月,星" autofocus>
      <select id="level" aria-label="Level">
        <option value="">All</option>
        <option value="N5">N5</option>
        <option value="N4">N4</option>
        <option value="N3">N3</option>
        <option value="N2">N2</option>
        <option value="N1">N1</option>
      </select>
      <select id="mode" aria-label="Mode" title="Search mode">
        <option value="any">ANY</option>
        <option value="all">ALL</option>
      </select>
      <button id="reload" type="button" class="ghost">Reload</button>
    </div>
    <div class="hint">
      Phân tách bằng dấu cách, dấu phẩy hoặc xuống dòng. ANY = trả kết quả khớp bất kỳ token. ALL = mỗi token phải có ít nhất 1 kết quả (gộp).
    </div>
    <div class="chips" id="chips"></div>
    <div class="status" id="status">Loading...</div>
  </header>

  <div class="results" id="results"></div>
</div>

<script>
const FILES = {
  N5: "json_results/jlpt_level_5.json",
  N4: "json_results/jlpt_level_4.json",
  N3: "json_results/jlpt_level_3.json",
  N2: "json_results/jlpt_level_2.json",
  N1: "json_results/jlpt_level_1.json"
};

let DATA = [];
const MAX_RENDER = 500;

async function loadAll() {
  const status = document.getElementById('status');
  status.textContent = "Loading...";
  DATA = [];
  const entries = Object.entries(FILES);
  const results = await Promise.all(entries.map(async ([lvl, path]) => {
    try {
      const r = await fetch(path);
      if (!r.ok) throw new Error(r.status);
      const j = await r.json();
      return j.map(x => ({ ...x, Level: x.Level || lvl }));
    } catch (e) {
      console.warn("Failed:", path, e);
      return [];
    }
  }));
  DATA = results.flat();
  status.textContent = `Loaded ${DATA.length} kanji.`;
  render();
}

function parseTokens(raw) {
  if (!raw) return [];
  // Split by whitespace, comma, semicolon, full-width comma, newline.
  const parts = raw.split(/[\s,;、，]+/).map(s => s.trim()).filter(Boolean);
  // Dedupe, lowercase for matching.
  return [...new Set(parts.map(s => s.toLowerCase()))];
}

function matchToken(item, tok) {
  return (
    (item.Kanji && item.Kanji.toLowerCase().includes(tok)) ||
    (item.Vietsino && item.Vietsino.toLowerCase().includes(tok)) ||
    (item.Meaning && item.Meaning.toLowerCase().includes(tok)) ||
    (item.Kunyomi && item.Kunyomi.toLowerCase().includes(tok)) ||
    (item.Onyomi && item.Onyomi.toLowerCase().includes(tok))
  );
}

function render() {
  const raw = document.getElementById('q').value;
  const lvl = document.getElementById('level').value;
  const mode = document.getElementById('mode').value;
  const box = document.getElementById('results');
  const chips = document.getElementById('chips');

  const tokens = parseTokens(raw);

  // chips
  chips.innerHTML = tokens.map((t, i) =>
    `<span class="chip">${esc(t)} <button data-i="${i}" title="Remove">×</button></span>`
  ).join('');
  chips.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      const idx = +b.dataset.i;
      const remaining = tokens.filter((_, j) => j !== idx);
      document.getElementById('q').value = remaining.join(' ');
      render();
    });
  });

  let pool = lvl ? DATA.filter(x => x.Level === lvl) : DATA;
  let list = [];
  const missing = [];

  if (!tokens.length) {
    list = pool;
  } else if (mode === 'all') {
    // For each token, take its matches; union them. Track tokens with 0 hits.
    const seen = new Set();
    tokens.forEach(tok => {
      const hits = pool.filter(x => matchToken(x, tok));
      if (!hits.length) missing.push(tok);
      hits.forEach(h => {
        const key = h.Kanji + '|' + h.Level;
        if (!seen.has(key)) { seen.add(key); list.push(h); }
      });
    });
  } else {
    // ANY: union of any token match
    list = pool.filter(x => tokens.some(tok => matchToken(x, tok)));
  }

  const slice = list.slice(0, MAX_RENDER);

  let html = '';
  if (missing.length) {
    html += `<div class="missing">Không tìm thấy: ${missing.map(esc).join(', ')}</div>`;
  }

  if (!slice.length) {
    html += '<div class="empty">Không có kết quả.</div>';
    box.innerHTML = html;
    document.getElementById('status').textContent =
      `0/${pool.length} (tokens: ${tokens.length})`;
    return;
  }

  html += slice.map(x => `
    <div class="card">
      <div class="head">
        <span class="kanji">${hl(x.Kanji || '', tokens)}</span>
        <span class="level">${esc(x.Level || '')}</span>
      </div>
      <div class="row"><span class="label">Vietsino</span><span class="val">${hl(x.Vietsino || '', tokens)}</span></div>
      <div class="row"><span class="label">Meaning</span><span class="val">${hl(x.Meaning || '', tokens)}</span></div>
      <div class="row"><span class="label">Onyomi</span><span class="val">${hl(x.Onyomi || '', tokens)}</span></div>
      <div class="row"><span class="label">Kunyomi</span><span class="val">${hl(x.Kunyomi || '', tokens)}</span></div>
      <div class="row"><span class="label">Strokes</span><span class="val">${esc(x.StrokeCount || '')}</span></div>
      ${x.Radicals ? `<div class="row"><span class="label">Radicals</span><span class="val">${esc(x.Radicals)}</span></div>` : ''}
      ${x.Explanation ? `<div class="explain">${esc(x.Explanation)}</div>` : ''}
    </div>
  `).join('');

  box.innerHTML = html;

  document.getElementById('status').textContent =
    `Hiển thị ${slice.length}/${list.length} (pool ${pool.length}, tokens ${tokens.length}${tokens.length ? ', mode ' + mode.toUpperCase() : ''}).`;
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function hl(s, tokens) {
  const safe = esc(s);
  if (!tokens || !tokens.length) return safe;
  const escaped = tokens
    .map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'))
    .filter(Boolean)
    .sort((a, b) => b.length - a.length);
  if (!escaped.length) return safe;
  const re = new RegExp('(' + escaped.join('|') + ')', 'gi');
  return safe.replace(re, '<mark>$1</mark>');
}

let t;
document.getElementById('q').addEventListener('input', () => {
  clearTimeout(t);
  t = setTimeout(render, 120);
});
document.getElementById('level').addEventListener('change', render);
document.getElementById('mode').addEventListener('change', render);
document.getElementById('reload').addEventListener('click', loadAll);

loadAll();
</script>
</body>
</html>
